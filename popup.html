<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    background: #f8fafc;
  }
  .header {
    background: #1e293b;
    color: white;
    padding: 12px 16px;
  }
  .header h1 { font-size: 14px; font-weight: 600; }
  .header p { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .section {
    padding: 14px 16px;
    border-bottom: 1px solid #e2e8f0;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .input-group {
    display: flex;
    gap: 6px;
  }
  .input-group input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 13px;
    font-family: 'SF Mono', 'Consolas', monospace;
    outline: none;
  }
  .input-group input:focus {
    border-color: #1a73e8;
    box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
  }
  .input-group input::placeholder {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #94a3b8;
  }
  .btn-primary {
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-primary:hover { background: #1557b0; }
  .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-secondary {
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-secondary:hover { background: #e2e8f0; }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .toggle-label {
    font-size: 13px;
    line-height: 1.3;
  }
  .toggle-desc {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
  }
  .toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }
  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #cbd5e1;
    border-radius: 22px;
    transition: 0.2s;
  }
  .toggle-slider::before {
    content: "";
    position: absolute;
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
  }
  .toggle-switch input:checked + .toggle-slider {
    background: #1a73e8;
  }
  .toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(18px);
  }
  .status {
    padding: 8px 16px;
    font-size: 11px;
    color: #64748b;
    text-align: center;
  }
  .theme-select {
    padding: 5px 8px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 12px;
    background: white;
    color: #1a1a1a;
    cursor: pointer;
    outline: none;
    flex-shrink: 0;
  }
  .theme-select:focus {
    border-color: #1a73e8;
    box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
  }
  .status.error { color: #dc2626; background: #fef2f2; }
  .status.success { color: #166534; background: #dcfce7; }
  .footer {
    padding: 8px 16px 10px;
    font-size: 11px;
    color: #64748b;
    text-align: center;
    border-top: 1px solid #e2e8f0;
  }
  .footer a {
    color: #1a73e8;
    text-decoration: none;
    margin: 0 4px;
  }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="header">
    <h1>OIC Activity Stream Viewer</h1>
    <p>Enhanced tree view with single scroll</p>
  </div>

  <div class="section">
    <div class="section-title">Open Activity Stream</div>
    <div class="input-group">
      <input type="text" id="instanceId" placeholder="Paste Instance ID here...">
      <button class="btn-primary" id="openBtn">Open</button>
    </div>
    <div style="margin-top:8px;display:flex;gap:6px">
      <button class="btn-secondary" id="importBtn">Import JSON</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Settings</div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Auto-detect button</div>
        <div class="toggle-desc">Show floating button when Activity Stream is detected on page</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="autoDetect">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row" style="margin-top:10px">
      <div>
        <div class="toggle-label">Color theme</div>
        <div class="toggle-desc">Choose viewer appearance</div>
      </div>
      <select id="themeSelect" class="theme-select">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="high-contrast">High Contrast</option>
        <option value="solarized">Solarized</option>
      </select>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="footer">
    <a href="https://github.com/marat-ak/oic-activity-viewer-extension/issues/new?template=bug_report.yml" target="_blank" rel="noopener">Report bug</a>
    ·
    <a href="https://github.com/marat-ak/oic-activity-viewer-extension/issues/new?template=feature_request.yml" target="_blank" rel="noopener">Request feature</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
